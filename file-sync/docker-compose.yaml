version: '3.3'

services:
  db:
    image: postgres:18
    container_name: googledocs-db
    env_file:
      - ./primary-backend/db/.db.env
    ports:
      - "5432:5432"
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./primary-backend/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  postgres-data: